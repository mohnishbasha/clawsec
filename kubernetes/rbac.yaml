apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawsec-sa
  namespace: clawsec
  labels:
    app.kubernetes.io/name: clawsec
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clawsec-role
  namespace: clawsec
  labels:
    app.kubernetes.io/name: clawsec
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["clawsec-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clawsec-rolebinding
  namespace: clawsec
  labels:
    app.kubernetes.io/name: clawsec
subjects:
  - kind: ServiceAccount
    name: clawsec-sa
    namespace: clawsec
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: clawsec-role
