apiVersion: v1
kind: Service
metadata:
  name: clawsec
  namespace: clawsec
  labels:
    app: clawsec
    app.kubernetes.io/name: clawsec
spec:
  selector:
    app: clawsec
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: ClusterIP
