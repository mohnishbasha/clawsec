apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clawsec-network-policy
  namespace: clawsec
  labels:
    app.kubernetes.io/name: clawsec
spec:
  podSelector:
    matchLabels:
      app: clawsec
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Allow Prometheus scraping from the monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow traces to reach the OTel collector
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # Allow outbound HTTPS for LLM API calls
    - ports:
        - protocol: TCP
          port: 443
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
