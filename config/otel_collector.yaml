receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  resource:
    attributes:
      - action: insert
        key: environment
        value: production

exporters:
  logging:
    loglevel: info
  prometheus:
    endpoint: "0.0.0.0:9092"
  otlphttp/victorialogs:
    endpoint: "http://victorialogs:9428/insert/opentelemetry"
    tls:
      insecure: true
    headers:
      VL-Stream-Fields: "service.name,severity"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging, prometheus]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [logging, otlphttp/victorialogs]
